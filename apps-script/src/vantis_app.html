<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANTIS ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:          #F4F6F9;
  --surface:     #FFFFFF;
  --border:      #E0E0E0;
  --text:        #212121;
  --text-sub:    #757575;
  --text-light:  #9E9E9E;
  --verde:       #1B5E20;
  --verde-mid:   #388E3C;
  --verde-light: #E8F5E9;
  --amarillo:    #F57F17;
  --amar-light:  #FFF8E1;
  --rojo:        #B71C1C;
  --rojo-light:  #FFEBEE;
  --azul:        #0D47A1;
  --azul-light:  #E3F2FD;
  --sidebar-bg:  #1A237E;
  --sidebar-act: #283593;
  --topbar-h:    52px;
  --sidebar-w:   200px;
  --radius:      8px;
  --radius-lg:   12px;
  --shadow:      0 2px 8px rgba(0,0,0,0.07);
  --font:        'Inter', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); }

/* ── SHELL ── */
.shell {
  display: grid;
  grid-template-rows: var(--topbar-h) 1fr;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-areas: "topbar topbar" "sidebar main";
  height: 100vh;
}

/* ── TOPBAR ── */
.topbar {
  grid-area: topbar;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  z-index: 100;
}
.brand {
  font-size: 17px;
  font-weight: 700;
  color: var(--azul);
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 160px;
}
.brand-dot { width: 7px; height: 7px; background: var(--azul); border-radius: 50%; }
.tdiv { width: 1px; height: 20px; background: var(--border); }
.tinfo { display: flex; gap: 20px; }
.titem { display: flex; flex-direction: column; }
.tlabel { font-size: 9px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.tval   { font-size: 12px; font-weight: 600; color: var(--text); }
.tright { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.live { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--verde); font-weight: 600; }
.live-dot { width: 6px; height: 6px; background: var(--verde); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.tuser { font-size: 11px; color: var(--text-sub); font-weight: 500; }

/* ── SIDEBAR ── */
.sidebar {
  grid-area: sidebar;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  padding: 12px 0;
  overflow-y: auto;
}
.slabel { font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; padding: 10px 16px 4px; }
.sitem {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer;
  color: rgba(255,255,255,0.65); font-size: 12px; font-weight: 400;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.sitem:hover { background: var(--sidebar-act); color: #fff; }
.sitem.active { background: var(--sidebar-act); color: #fff; border-left-color: #7986CB; font-weight: 600; }
.sicon { font-size: 14px; min-width: 18px; text-align: center; }
.sdiv { height: 1px; background: rgba(255,255,255,0.08); margin: 6px 12px; }
.sbadge { margin-left: auto; background: var(--rojo); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 8px; min-width: 16px; text-align: center; }
.sfooter { margin-top: auto; padding: 12px 16px; font-size: 9px; color: rgba(255,255,255,0.3); }

/* ── MAIN ── */
.main {
  grid-area: main;
  display: flex;
  flex-direction: column;
  padding: 14px 18px;
  gap: 10px;
  overflow: hidden;
  height: calc(100vh - var(--topbar-h));
}

/* ── PAGE HEADER ── */
.phead { display: flex; align-items: baseline; justify-content: space-between; flex-shrink: 0; }
.phead-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.phead-sub { font-size: 11px; color: var(--text-sub); margin-top: 1px; }
.phead-right { font-size: 10px; color: var(--text-light); }

/* ── SCORE BANDA ── */
.score-banda {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}
.score-label { font-size: 9px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
.score-bar-wrap { flex: 1; height: 10px; background: var(--border); border-radius: 5px; overflow: hidden; }
.score-bar { height: 100%; border-radius: 5px; background: linear-gradient(90deg,#1B5E20,#4CAF50); transition: width 1.2s ease; }
.score-num { font-size: 18px; font-weight: 700; color: var(--azul); white-space: nowrap; }
.score-estado { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
.sdiv-v { width: 1px; height: 28px; background: var(--border); }

/* ── SEMÁFOROS EJECUTIVOS ── */
.sem-exec-group { display: flex; gap: 8px; }
.sem-exec {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 14px;
  border-radius: var(--radius);
  font-size: 12px; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  border: none;
}
.sem-exec:hover { opacity: 0.85; }
.sem-exec-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.se-verde { background: var(--verde-light); color: var(--verde); }
.se-amar  { background: var(--amar-light);  color: var(--amarillo); }
.se-rojo  { background: var(--rojo-light);  color: var(--rojo); }
.se-dot-verde { background: var(--verde); }
.se-dot-amar  { background: var(--amarillo); }
.se-dot-rojo  { background: var(--rojo); }

/* ── KPI GRID ── */
.kpi-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; flex-shrink: 0; }
.kpi {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 12px 14px;
  border-top: 3px solid var(--border);
  box-shadow: var(--shadow);
  display: flex; flex-direction: column; gap: 4px;
}
.kpi.verde { border-top-color: var(--verde); }
.kpi.amar  { border-top-color: var(--amarillo); }
.kpi.rojo  { border-top-color: var(--rojo); }
.kpi.azul  { border-top-color: var(--azul); }
.kpi-t { font-size: 9px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.4px; }
.kpi-v { font-size: 19px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; line-height: 1.2; }
.kpi-s { font-size: 10px; color: var(--text-sub); }
.per-btn {
  background: var(--border);
  border: none;
  border-radius: 4px;
  padding: 3px 8px;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-sub);
  cursor: pointer;
  transition: all 0.15s;
}
.per-btn:hover { background: var(--azul-light); color: var(--azul); }
.per-btn.active { background: var(--azul); color: #fff; }
.kpi-tag { font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 6px; display: inline-block; margin-top: 2px; }
.tag-verde { background: var(--verde-light); color: var(--verde); }
.tag-rojo  { background: var(--rojo-light);  color: var(--rojo); }
.tag-amar  { background: var(--amar-light);  color: var(--amarillo); }
.tag-azul  { background: var(--azul-light);  color: var(--azul); }

/* ── CUERPO 70/30 ── */
.body-grid { display: grid; grid-template-columns: 1fr 0.43fr; gap: 10px; flex: 1; min-height: 0; }

/* ── PANEL IZQUIERDO ── */
.panel-izq { background: var(--surface); border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 0; }
.chart-title { font-size: 9px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; flex-shrink: 0; }
.chart-wrap { flex: 1; min-height: 0; position: relative; }

/* ── PANEL DERECHO ── */
.panel-der { display: flex; flex-direction: column; gap: 8px; min-height: 0; }
.mini-card { background: var(--surface); border-radius: var(--radius-lg); padding: 10px 14px; box-shadow: var(--shadow); display: flex; flex-direction: column; }
.mini-card.flex1 { flex: 1; min-height: 0; }
.mini-card.flex2 { flex: 2; min-height: 0; }
.mini-card.flex05 { flex: 0.5; min-height: 0; }
.mini-chart-wrap { flex: 1; min-height: 0; position: relative; }

/* ── FOOTER ACCIONES ── */
.footer-acc {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
  font-size: 12px; font-weight: 500;
  border-left: 4px solid var(--verde);
}
.footer-acc.urgente { border-left-color: var(--rojo); }
.footer-acc-icon { font-size: 14px; }
.footer-acc-btn {
  margin-left: auto;
  background: var(--azul); color: #fff;
  border: none; border-radius: 6px;
  padding: 4px 12px; font-size: 10px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}

/* ── SKUS QUIEBRE ── */
.sku-list { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sku-row { display: flex; align-items: center; justify-content: space-between; font-size: 10px; padding: 3px 0; border-bottom: 1px solid var(--border); }
.sku-row:last-child { border-bottom: none; }
.sku-name { color: var(--text); font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sku-dias { font-weight: 700; padding: 1px 6px; border-radius: 4px; font-size: 9px; white-space: nowrap; }

/* ── COMING SOON ── */
.coming { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text-light); }
.coming-icon { font-size: 40px; opacity: 0.25; }
.coming-title { font-size: 16px; font-weight: 600; }
.coming-sub { font-size: 12px; }

/* ── LOADING ── */
.loading { display: flex; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--text-light); font-size: 13px; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--azul); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="shell">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand"><div class="brand-dot"></div>VANTIS</div>
    <div class="tdiv"></div>
    <div class="tinfo">
      <div class="titem"><span class="tlabel">Empresa</span><span class="tval" id="t-empresa">—</span></div>
      <div class="titem"><span class="tlabel">Período</span><span class="tval" id="t-periodo">—</span></div>
      <div class="titem"><span class="tlabel">Actualizado</span><span class="tval" id="t-fecha">—</span></div>
    </div>
    <div class="tright">
      <div class="live"><div class="live-dot"></div>LIVE</div>
      <div class="tdiv"></div>
      <div class="tuser" id="t-user">—</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="slabel">Principal</div>
    <div class="sitem active" data-mod="dashboard">
      <span class="sicon">🏠</span>Dashboard
    </div>
    <div class="slabel">Gestión</div>
    <div class="sitem" data-mod="finanzas"><span class="sicon">💰</span>Finanzas</div>
    <div class="sitem" data-mod="comercial"><span class="sicon">📈</span>Comercial</div>
    <div class="sitem" data-mod="transacciones"><span class="sicon">🧾</span>Transacciones</div>
    <div class="sitem" data-mod="inventario"><span class="sicon">🏭</span>Inventario</div>
    <div class="sitem" data-mod="cobranza"><span class="sicon">🤝</span>Cobranza</div>
    <div class="sitem" data-mod="proveedores"><span class="sicon">🏢</span>Proveedores</div>
    <div class="sdiv"></div>
    <div class="sitem" data-mod="alertas">
      <span class="sicon">🔔</span>Alertas
      <span class="sbadge" id="badge-alertas">0</span>
    </div>
    <div class="sdiv"></div>
    <div class="slabel">Sistema</div>
    <div class="sitem" data-mod="reportes"><span class="sicon">📊</span>Reportes</div>
    <div class="sitem" data-mod="carga-masiva"><span class="sicon">📥</span>Carga Masiva</div>
    <div class="sitem" data-mod="cierres"><span class="sicon">🔒</span>Cierres</div>
    <div class="sitem" data-mod="configuracion"><span class="sicon">⚙️</span>Configuración</div>
    <div class="sfooter">VANTIS ERP v1.0</div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main"></main>

</div>
<script>
// ── ESTADO ──
var G = { modulo: 'dashboard', ctx: null, data: null, charts: {} };

// ── INIT ──
document.addEventListener('DOMContentLoaded', function() {
  // Navegación sidebar
  document.querySelectorAll('.sitem').forEach(function(el) {
    el.addEventListener('click', function() {
      document.querySelectorAll('.sitem').forEach(function(x){ x.classList.remove('active'); });
      el.classList.add('active');
      navegar(el.dataset.mod);
    });
  });

  // Cargar contexto
  google.script.run
    .withSuccessHandler(function(ctx) {
      if (!ctx) return;
      G.ctx = ctx;
      document.getElementById('t-empresa').textContent = ctx.nombreEmpresa;
      document.getElementById('t-periodo').textContent = ctx.periodo;
      document.getElementById('t-fecha').textContent   = ctx.fechaCalculo;
      document.getElementById('t-user').textContent    = ctx.usuario;
      navegar('dashboard');
    })
    .withFailureHandler(function(e) { mostrarError(e.message); })
    .getDatosContexto();
});

// ── NAVEGACIÓN ──
function abrirFicha(tipo, id) {
  G._idAbrir = id;
  G._fichaOrigen = G.modulo;
  document.querySelectorAll('.sitem').forEach(function(el){ el.classList.remove('active'); });
  navegar(tipo === 'cliente' ? 'ficha-cliente' : 'ficha-proveedor');
}

function volverDesdeFicha() {
  navegar(G._fichaOrigen || 'comercial');
}

function navegar(mod) {
  console.log('NAVEGANDO A:', mod);
  G.modulo = mod;
  G._navToken = (G._navToken||0) + 1;
  var miToken = G._navToken;
  // Destruir charts anteriores
  Object.keys(G.charts).forEach(function(k) {
    try { G.charts[k].destroy(); } catch(e) {}
  });
  G.charts = {};

  var main = document.getElementById('main');
  main.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';

if (mod === 'nuevo-cliente') {
      pintarFormCliente(null);
      return;
    }

    if (mod === 'nuevo-proveedor') {
      pintarFormProveedor(null);
      return;
    }

if (mod === 'nueva-compra') {
      pintarNuevaCompra();
      return;
    }

if (mod === 'nueva-venta') {
      pintarNuevaVenta();
      return;
    }

if (mod === 'transacciones') {
      pintarTransacciones();
      return;
    }

if (mod === 'carga-masiva') {
      pintarCargaMasiva();
      return;
    }

if (mod === 'cierres') {
      google.script.run
        .withSuccessHandler(function(d) { pintarCierres(d); })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .listarCierres();
      return;
    }

if (mod === 'reportes') {
      pintarCentroReportes();
      return;
    }

if (mod === 'configuracion') {
      pintarConfiguracion();
      return;
    }

if (mod === 'lista-clientes') {
      google.script.run
        .withSuccessHandler(function(d) { pintarListaEntidad(d, 'cliente'); })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .listarClientes();
      return;
    }

if (mod === 'lista-proveedores') {
      google.script.run
        .withSuccessHandler(function(d) { pintarListaEntidad(d, 'proveedor'); })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .listarProveedores();
      return;
    }
    if (mod === 'ficha-cliente') {
      google.script.run
        .withSuccessHandler(function(d) {
          if (!d) { mostrarError('Cliente no encontrado'); return; }
          pintarFichaCliente(d);
        })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .getFichaCliente(G._idAbrir);
      return;
    }
    if (mod === 'ficha-proveedor') {
      google.script.run
        .withSuccessHandler(function(d) {
          if (!d) { mostrarError('Proveedor no encontrado'); return; }
          pintarFichaProveedor(d);
        })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .getFichaProveedor(G._idAbrir);
      return;
    }

if (mod === 'alertas') {
      google.script.run
        .withSuccessHandler(function(d) {
          if (miToken !== G._navToken) return;
          if (!d) { mostrarError('Sin datos alertas'); return; }
          try {
            pintarAlertas(d);
          } catch(err) {
            console.error('Error en pintarAlertas:', err);
            mostrarError('Error renderizando: ' + err.message);
          }
        })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .getAlertasData();
      return;
    }

if (mod === 'proveedores') {
      google.script.run
        .withSuccessHandler(function(d) {
          if (miToken !== G._navToken) return;
          if (!d) { mostrarError('Sin datos proveedores'); return; }
          try {
            pintarProveedores(d);
          } catch(err) {
            console.error('Error en pintarProveedores:', err);
            mostrarError('Error renderizando: ' + err.message);
          }
        })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .getProveedoresData();
      return;
    }

if (mod === 'cobranza') {
      google.script.run
        .withSuccessHandler(function(d) {
          if (miToken !== G._navToken) return;
          console.log('Cobranza data recibida:', d);
          if (!d) { mostrarError('Sin datos cobranza'); return; }
          try {
            pintarCobranza(d);
          } catch(err) {
            console.error('Error en pintarCobranza:', err);
            mostrarError('Error renderizando: ' + err.message);
          }
        })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .getCobranzaData();
      return;
    }

if (mod === 'inventario') {
      google.script.run
        .withSuccessHandler(function(d) {
          if (miToken !== G._navToken) return;
          if (!d) { mostrarError('Sin datos inventario'); return; }
          pintarInventario(d);
        })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .getInventarioData();
      return;
    }

if (mod === 'comercial') {
      google.script.run
        .withSuccessHandler(function(d) {
          if (miToken !== G._navToken) return;
          if (!d) { mostrarError('Sin datos comercial'); return; }
          pintarComercial(d);
        })
        .withFailureHandler(function(e) { mostrarError(e.message); })
        .getComercialData();
      return;
    }

if (mod === 'finanzas') {
      google.script.run
        .withSuccessHandler(function(d) {
          if (miToken !== G._navToken) return;
          console.log('FINANZAS RAW:', d);
          if (d && d.ok === false) { mostrarError('ERROR REAL: ' + d.errorReal); return; }
          if (!d) { mostrarError('Sin datos finanzas'); return; }
          pintarFinanzas(d);
        })
        .withFailureHandler(function(e) { mostrarError('FALLO: ' + e.message); })
        .getFinanzasData();
      return;
    }

 if (mod === 'dashboard') {
    google.script.run
      .withSuccessHandler(function(d) {
        if (miToken !== G._navToken) return;
        if (!d) { mostrarError('Sin datos'); return; }
        G.data = d;
        document.getElementById('badge-alertas').textContent = d.alertas || 0;
        pintarDashboard(d);
      })
      .withFailureHandler(function(e) { mostrarError(e.message); })
      .getDashboardData();
  } else {
    var info = {
      finanzas:      ['💰','Finanzas','Flujo de caja, ingresos y egresos'],
      comercial:     ['📈','Comercial','Ventas, clientes y márgenes'],
      inventario:    ['🏭','Inventario','Stock, movimientos y alertas'],
      cobranza:      ['🤝','Cobranza','CxC, aging y gestión de cobros'],
      proveedores:   ['🏢','Proveedores','CxP y gestión de pagos'],
      alertas:       ['🔔','Alertas','Alertas críticas del sistema']
    };
    var i = info[mod] || ['📄', mod, ''];
    main.innerHTML =
      '<div class="phead" style="flex-shrink:0"><div>' +
        '<div class="phead-title">'+i[1]+'</div>' +
        '<div class="phead-sub">'+i[2]+'</div>' +
      '</div></div>' +
      '<div class="coming">' +
        '<div class="coming-icon">'+i[0]+'</div>' +
        '<div class="coming-title">Módulo en desarrollo</div>' +
        '<div class="coming-sub">Disponible en la próxima fase de VANTIS ERP</div>' +

    var semana = lista.filter(function(a){ return a.tiempo === 'SEMANA'; });

      kpiF('PAGOS', String(d.totalPagos), 'Cuentas por pagar', d.totalPagos>0?'amar':'verde') +

  var cont = document.getElementById('alert-lista');

  function item(a) {
    var icono = a.nivel === 1 ? '🔴' : a.nivel === 2 ? '🟡' : '🔵';
    var nivelTxt = a.nivel === 1 ? 'CRÍTICA' : a.nivel === 2 ? 'MEDIA' : 'BAJA';
    var nivelColor = a.nivel === 1 ? 'var(--rojo)' : a.nivel === 2 ? 'var(--amarillo)' : 'var(--azul)';
    var modLabel = { inventario:'Inventario', cobranza:'Cobranza', proveedores:'Proveedores', comercial:'Comercial' }[a.modulo] || a.modulo;
    return '<div style="display:flex;align-items:flex-start;gap:10px;padding:12px;border-bottom:1px solid var(--border)">' +
      '<div style="font-size:16px">'+icono+'</div>' +
      '<div style="flex:1">' +
        '<div style="font-size:9px;font-weight:700;color:'+nivelColor+';text-transform:uppercase">'+nivelTxt+'</div>' +
        '<div style="font-size:12px;font-weight:600;color:var(--text);margin:2px 0">'+a.texto+'</div>' +
        '<div style="font-size:10px;color:var(--text-sub)">'+modLabel+'</div>' +
        '<div style="font-size:10px;color:var(--azul);margin-top:4px">Sugerido: '+a.sugerido+'</div>' +
      '</div>' +
      '<button class="footer-acc-btn" onclick="navegar(\''+a.modulo+'\')">Ir a '+modLabel+' →</button>' +
    '</div>';
  }
  function grupo(label, icono, color, items) {
    if (!items.length) return '';
    return '<div style="background:'+color+';padding:6px 12px;font-size:10px;font-weight:700;color:#fff">'+icono+' '+label+' ('+items.length+')</div>' +
      items.map(item).join('');

  if (!lista.length) {
    var fechaBatchTxt = d.ultimoBatch ? new Date(d.ultimoBatch).toLocaleString('es-CL') : '—';
    cont.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;color:var(--text-light)">' +

      '<div style="font-size:10px;margin-top:6px">Último batch: '+fechaBatchTxt+'</div>' +

  var semanaL = lista.filter(function(a){ return a.tiempo === 'SEMANA'; });
  var planL = lista.filter(function(a){ return a.tiempo === 'PLANIFICAR'; });
  cont.innerHTML = grupo('HOY','🔴','var(--rojo)',hoyL) +
                   grupo('ESTA SEMANA','🟡','var(--amarillo)',semanaL) +

function pintarInventario(d) {
  var main = document.getElementById('main');

  var clsCrit = d.criticos === 0 ? 'verde' : d.criticos <= 2 ? 'amar' : 'rojo';
  var clsSin  = d.sinStock === 0 ? 'verde' : 'rojo';

  var maxStock = Math.max.apply(null, d.productos.map(function(p){ return p.stock; }).concat([1]));
  var stockBarsHTML = d.productos.length ? d.productos.map(function(p) {
    var pct = Math.round((p.stock/maxStock)*100);
    var color = p.estado===3 ? 'var(--verde)' : p.estado===2 ? 'var(--amarillo)' : 'var(--rojo)';
    return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
      '<div style="width:90px;font-size:10px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+p.nombre+'</div>' +
      '<div style="flex:1;height:14px;background:var(--border);border-radius:4px;overflow:hidden">' +
        '<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:4px"></div>' +
      '</div>' +
      '<div style="width:60px;font-size:10px;font-weight:600;text-align:right">'+p.stock+' unid.</div>' +
    '</div>';
  }).join('') : '<div style="font-size:10px;color:var(--text-light);padding:8px 0">Sin productos activos</div>';

  var tablaHTML = '<table style="width:100%;border-collapse:collapse;font-size:10px">' +
    '<thead><tr style="color:var(--text-light);font-weight:600">' +
    '<th style="padding:4px;text-align:left">#</th>' +
    '<th style="padding:4px;text-align:left">SKU</th>' +
    '<th style="padding:4px;text-align:left">Nombre</th>' +
    '<th style="padding:4px;text-align:right">Stock</th>' +
    '<th style="padding:4px;text-align:right">Mín.</th>' +
    '<th style="padding:4px;text-align:right">Costo</th>' +
    '<th style="padding:4px;text-align:right">Valor</th>' +
    '<th style="padding:4px;text-align:right">Días sin venta</th>' +

    '<th style="padding:4px;text-align:center">Estado</th>' +
    '</tr></thead><tbody>';
  d.productos.forEach(function(p,i) {
    var icono = p.estado===3 ? '🟢' : p.estado===2 ? '🟡' : '🔴';
    var diasTxt, diasCls;
    if (p.diasSinVenta === null || p.diasSinVenta === undefined) {

    }
    var sugTxt = p.sugerido > 0
      ? '<span style="color:var(--azul);font-weight:600">'+p.sugerido+' unid.</span>'
      : '<span style="color:var(--text-light)">—</span>';
    tablaHTML +=
      '<tr style="border-top:1px solid var(--border)">' +

      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0">' +
        '<div class="chart-title" style="margin-bottom:0">Ficha de Productos</div>' +
        '<button class="footer-acc-btn" style="background:var(--border);color:var(--text-sub)" title="Disponible en próxima fase">+ Nuevo Producto</button>' +
      '</div>' +
      tablaHTML +

  if (tieneHistorico) {
    var el = document.getElementById('c-inv-evol');
    if (el) {
      G.charts['invEvol'] = new Chart(el, {
        type: 'bar',
        data: {
          labels: d.evolucion.labels,

            y:{ beginAtZero:true, grid:{ color:'#F0F0F0' }, ticks:{ font:{size:9} } },
            x:{ grid:{ display:false }, ticks:{ font:{size:9} } }

        }

function filtrarComercial(n) {
  document.querySelectorAll('#com-sel .per-btn').forEach(function(b) {
    b.classList.toggle('active', Number(b.dataset.n) === n);
  });
  var ev = G._comData;
  if (!ev) return;
  var labels   = ev.labels.slice(-n);
  var ventas   = ev.ventas.slice(-n);
  var tend     = ev.tendencia.slice(-n);
  var el       = document.getElementById('c-ventas-com');
  if (!el) return;

  if (labels.length < 2) {
    el.style.display = 'none';
    var wrap = el.parentElement;
    if (!wrap.querySelector('.com-msg')) {
      var msg = document.createElement('div');
      msg.className = 'com-msg';
      msg.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;font-size:11px;color:var(--text-light);text-align:center;padding:16px';
      msg.innerHTML = '📈 Acumulando histórico de ventas.<br>Disponible en el próximo cierre de período.';
      wrap.appendChild(msg);
    }
    return;
  }

  el.style.display = 'block';
  var msgEl = el.parentElement.querySelector('.com-msg');
  if (msgEl) msgEl.style.display = 'none';

  var todos  = ventas.filter(function(v){ return v>0; });
  var minVal = Math.min.apply(null, [0].concat(todos)) * 0.9;
  var maxVal = Math.max.apply(null, todos.concat([ev.meta||0])) * 1.1;

  var datasets = [
    { label: 'Ventas', data: ventas,
      borderColor: '#0D47A1', backgroundColor: 'rgba(13,71,161,0.07)',
      borderWidth: 2, fill: true, tension: 0.4, pointRadius: 3 }
  ];

  // Tendencia
  var tendFiltrada = tend.filter(function(v){ return v !== null; });
  if (tendFiltrada.length > 0) {
    datasets.push({
      label: 'Tendencia', data: tend,
      borderColor: '#9E9E9E', borderDash: [4,4],
      borderWidth: 1.5, fill: false, tension: 0.4,
      pointRadius: 0, spanGaps: true
    });
  }

  // Meta horizontal
  if (ev.meta && ev.meta > 0) {
    datasets.push({
      label: 'Meta', data: labels.map(function(){ return ev.meta; }),
      borderColor: '#1B5E20', borderDash: [5,5],
      borderWidth: 1.5, fill: false, pointRadius: 0
    });
  }

  if (G.charts['ventasCom']) {
    G.charts['ventasCom'].data.labels = labels;
    G.charts['ventasCom'].data.datasets = datasets;
    G.charts['ventasCom'].options.scales.y.min = minVal;
    G.charts['ventasCom'].options.scales.y.max = maxVal;
    G.charts['ventasCom'].update();
    return;
  }

  G.charts['ventasCom'] = new Chart(el, {
    type: 'line',
    data: { labels: labels, datasets: datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position:'bottom', labels:{ font:{size:9}, boxWidth:8, padding:6 } } },
      scales: {
        y: { min: minVal, max: maxVal, grid:{ color:'#F0F0F0' },
             ticks:{ font:{size:9}, callback:function(v){ return '$'+(v/1000).toFixed(0)+'K'; } } },
        x: { grid:{ display:false }, ticks:{ font:{size:9} } }
      }
    }
  });
}

    '<div style="display:grid;grid-template-columns:' + (d.evolucion && d.evolucion.labels.length >= 2 ? '1.5fr 1fr' : '1fr') + ';gap:10px;flex:1;min-height:0">' +

function proyeccionHTML(d) {

      '<div style="width:90px;font-size:10px;color:var(--text-sub)">'+label+'</div>' +

      '</div>' +
      '<div style="width:70px;text-align:right;font-size:10px;font-weight:600">'+fmtM(monto)+'</div>' +
    '</div>';
  }
  return barra('Caja actual', d.cajaPeriodo, 'var(--azul)') +

    barra('CxP exigible', d.cxpPresion, 'var(--rojo)') +

      '<div style="text-align:right">' +
        '<div style="font-size:9px;color:var(--text-light)">Cobertura Total (caja + CxC)</div>' +
        '<div style="font-size:14px;font-weight:700;color:var(--azul)">'+d.diasCobertura+' días</div>' +
      '</div>' +
    '</div>';
}

function filtrarFlujo(n) {
  document.querySelectorAll('#flujo-sel .per-btn').forEach(function(b) {
    b.classList.toggle('active', Number(b.dataset.n) === n);
  });
  var ev = G._flujoData;
  if (!ev) return;
  var labels   = ev.labels.slice(-n);
  var ingresos = ev.ingresos.slice(-n);
  var egresos  = ev.egresos.slice(-n);

  var contenedor = document.getElementById('c-flujo-evol');
  if (!contenedor) return;

  if (labels.length < 2) {
    if (G.charts['flujoEvol']) { G.charts['flujoEvol'].destroy(); delete G.charts['flujoEvol']; }
    contenedor.style.display = 'none';
    var wrapper = contenedor.parentElement;
    var msg = wrapper.querySelector('.flujo-msg');
    if (!msg) {
      msg = document.createElement('div');
      msg.className = 'flujo-msg';
      msg.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;font-size:11px;color:var(--text-light);text-align:center;padding:16px';
      msg.innerHTML = '📈 Acumulando histórico de flujo.<br>Disponible en el próximo cierre de período.';
      wrapper.appendChild(msg);
    }
    return;
  }

  var msgEl = contenedor.parentElement.querySelector('.flujo-msg');
  if (msgEl) msgEl.style.display = 'none';
  contenedor.style.display = 'block';

  var todos   = ingresos.concat(egresos);
  var minVal  = Math.min.apply(null, [0].concat(todos)) * 0.9;
  var maxVal  = Math.max.apply(null, todos) * 1.1;

  if (G.charts['flujoEvol']) {
    G.charts['flujoEvol'].data.labels = labels;
    G.charts['flujoEvol'].data.datasets[0].data = ingresos;
    G.charts['flujoEvol'].data.datasets[1].data = egresos;
    G.charts['flujoEvol'].options.scales.y.min = minVal;
    G.charts['flujoEvol'].options.scales.y.max = maxVal;
    G.charts['flujoEvol'].update();
    return;
  }

  G.charts['flujoEvol'] = new Chart(contenedor, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Ingresos', data: ingresos,
          borderColor: '#1B5E20', backgroundColor: 'rgba(27,94,32,0.12)',
          borderWidth: 2, fill: true, tension: 0.4, pointRadius: 3 },
        { label: 'Egresos',  data: egresos,
          borderColor: '#B71C1C', backgroundColor: 'rgba(183,28,28,0.08)',
          borderWidth: 2, fill: true, tension: 0.4, pointRadius: 3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position:'bottom', labels:{ font:{size:9}, boxWidth:8, padding:6 } } },
      scales: {
        y: { min: minVal, max: maxVal, grid:{ color:'#F0F0F0' },
             ticks:{ font:{size:9}, callback:function(v){ return '$'+(v/1000).toFixed(0)+'K'; } } },
        x: { grid:{ display:false }, ticks:{ font:{size:9} } }
      }
    }
  });
}

// ── FOOTER ACCIÓN ──
function footerAccion(d) {
  var cxcM60 = d.cxcMas60 || 0;
  var venc   = d.cxcVencida || 0;
  var monto  = cxcM60 + venc;
  var egrDia = d.egresosNeto > 0 ? d.egresosNeto / 30 : 1;
  var dias   = monto > 0 ? Math.round(monto / egrDia) : 0;

  if (d.accionesUrgentes === 0 && monto === 0) {
    return '<div class="footer-acc">' +
      '<span class="footer-acc-icon">✅</span>' +
      '<span>Sin acciones urgentes — Negocio operando dentro de parámetros normales</span>' +
    '</div>';
  }
  if (monto > 0) {
    return '<div class="footer-acc urgente">' +
      '<span class="footer-acc-icon">⚡</span>' +
      '<span>Acelerar cobranza de facturas vencidas y +60 días libera <strong>' + fmtM(monto) + '</strong>' +
      (dias > 0 ? ' — equivale a <strong>' + dias + ' días</strong> de operación' : '') + '</span>' +
      '<button class="footer-acc-btn" onclick="navegar(\'cobranza\')">→ Ir a Cobranza</button>' +
    '</div>';
  }
  return '<div class="footer-acc urgente">' +
    '<span class="footer-acc-icon">⚠️</span>' +
    '<span>' + d.accionesUrgentes + ' acción(es) urgente(s) requieren atención</span>' +
    '<button class="footer-acc-btn" onclick="navegar(\'alertas\')">→ Ver Alertas</button>' +
  '</div>';
}

// ── HELPERS UI ──
function semCls(v) { return v===3?'verde':v===2?'amar':'rojo'; }
function estadoTxt(v) { return v===3?'🟢 SALUDABLE':v===2?'🟡 ATENCIÓN':'🔴 CRÍTICO'; }
function semExec(v, label, mod) {
  var cls = 'se-'+semCls(v);
  var dot = 'se-dot-'+semCls(v);
  return '<button class="sem-exec '+cls+'" onclick="navegar(\''+mod+'\')">'+
    '<span class="sem-exec-dot '+dot+'"></span>'+label+'</button>';
}
function kpi(titulo, valor, sub, color) {
  return '<div class="kpi '+color+'">' +
    '<div class="kpi-t">'+titulo+'</div>' +
    '<div class="kpi-v">'+valor+'</div>' +
    '<div class="kpi-s">'+sub+'</div>' +
  '</div>';
}
function fmtM(n) {
  if (!n && n!==0) return '$0';
  return '$'+Math.round(n).toLocaleString('es-CL');
}
function fmtMConSigno(n) {
  if (!n && n!==0) return '$0';
  var neg = n < 0;
  return (neg?'(':'') + '$'+Math.abs(Math.round(n)).toLocaleString('es-CL') + (neg?')':'');
}
function fmtP(n) {
  if (!n && n!==0) return '0,0%';
  return (n*100).toFixed(1).replace('.',',')+'%';
}
function ventasMeta(d) {
  if (d.metaVentas && d.metaVentas > 0) {
    var pct = Math.round((d.ventasMes / d.metaVentas)*100);
    return 'Meta ' + pct + '% · ' + fmtM(d.metaVentas);
  }
  return 'Ticket ' + fmtM(d.ticketPromedio);
}
function cxcRiesgo(d) {
  if (!d.cxcTotal || d.cxcTotal === 0) return 'Sin cartera pendiente';
  var pct = d.cxcVencida / d.cxcTotal;
  return 'Riesgo ' + fmtP(pct) + ' de cartera';
}
function cxcColor(d) {
  if (!d.cxcTotal || d.cxcTotal === 0) return 'verde';
  var pct = d.cxcVencida / d.cxcTotal;
  return pct >= 0.1 ? 'rojo' : pct > 0 ? 'amar' : 'verde';
}
function margenColor(d) {
  if (d.margenPct >= 0.2) return 'verde';
  if (d.margenPct >= 0)   return 'amar';
  return 'rojo';
}
function mostrarError(msg) {
  document.getElementById('main').innerHTML =
    '<div class="loading">Error: ' + msg + '</div>';
}

function validarRUTEnVivo(input, errorId) {
  var rut = input.value.trim();
  var errorDiv = document.getElementById(errorId);
  if (!rut) { errorDiv.textContent = ''; return; }
  google.script.run
    .withSuccessHandler(function(esValido) {
      errorDiv.textContent = esValido ? '' : '⚠️ RUT inválido';
      errorDiv.style.color = esValido ? 'var(--verde)' : 'var(--rojo)';
    })
    .validarRUT(rut);
}

function guardarCliente(idExistente) {
  var datos = {
    razonSocial: document.getElementById('cli-razon').value,
    rut: document.getElementById('cli-rut').value,
    nombreFantasia: document.getElementById('cli-fantasia').value,
    giro: document.getElementById('cli-giro').value,
    email: document.getElementById('cli-email').value,
    telefono: document.getElementById('cli-telefono').value,
    direccion: document.getElementById('cli-direccion').value,
    comuna: document.getElementById('cli-comuna').value,
    condicionPago: document.getElementById('cli-condicion').value,
    limiteCredito: document.getElementById('cli-limite').value
  };
  if (idExistente) datos.id = idExistente;

  if (!datos.razonSocial.trim()) { alert('La razón social es obligatoria'); return; }
  if (!datos.rut.trim()) { alert('El RUT es obligatorio'); return; }

  var btn = document.querySelector('.footer-acc-btn[onclick*="guardarCliente"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  google.script.run
    .withSuccessHandler(function(resp) {
      if (btn) { btn.disabled = false; }
      if (!resp.ok) { alert('Error: ' + resp.error); if(btn) btn.textContent = idExistente?'✓ Guardar Cambios':'✓ Crear Cliente'; return; }
      if (idExistente) {
        abrirFicha('cliente', idExistente);
      } else {
        abrirFicha('cliente', resp.id);
      }
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = idExistente?'✓ Guardar Cambios':'✓ Crear Cliente'; }
      alert('Error del sistema: ' + e.message);
    })
    .procesarCliente(datos);
}

function guardarProveedor(idExistente) {
  var datos = {
    razonSocial: document.getElementById('prv-razon').value,
    rut: document.getElementById('prv-rut').value,
    nombreFantasia: document.getElementById('prv-fantasia').value,
    giro: document.getElementById('prv-giro').value,
    email: document.getElementById('prv-email').value,
    telefono: document.getElementById('prv-telefono').value,
    condicionPago: document.getElementById('prv-condicion').value,
    plazoEntrega: document.getElementById('prv-plazo').value
  };
  if (idExistente) datos.id = idExistente;

  if (!datos.razonSocial.trim()) { alert('La razón social es obligatoria'); return; }
  if (!datos.rut.trim()) { alert('El RUT es obligatorio'); return; }

  var btn = document.querySelector('.footer-acc-btn[onclick*="guardarProveedor"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  google.script.run
    .withSuccessHandler(function(resp) {
      if (btn) { btn.disabled = false; }
      if (!resp.ok) { alert('Error: ' + resp.error); if(btn) btn.textContent = idExistente?'✓ Guardar Cambios':'✓ Crear Proveedor'; return; }
      if (idExistente) {
        abrirFicha('proveedor', idExistente);
      } else {
        abrirFicha('proveedor', resp.id);
      }
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = idExistente?'✓ Guardar Cambios':'✓ Crear Proveedor'; }
      alert('Error del sistema: ' + e.message);
    })
    .procesarProveedor(datos);
}

function buscarProveedoresUI(termino) {
  var cont = document.getElementById('modal-resultados');
  if (!termino || termino.trim().length < 2) {
    cont.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-light);font-size:11px">Escribe al menos 2 caracteres</div>';
    return;
  }
  google.script.run
    .withSuccessHandler(function(resultados) {
      if (!resultados.length) {
        cont.innerHTML = '<div style="padding:16px;text-align:center;color:var(--text-light);font-size:11px">Sin resultados</div>';
        return;
      }
      cont.innerHTML = resultados.map(function(p) {
        return '<div style="padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'#fff\'" onclick="seleccionarProveedor(\''+p.id+'\',\''+p.nombre.replace(/'/g,"\\'")+'\',\''+p.rut+'\',\''+p.condicionPago+'\')">' +
          '<div style="font-size:12px;font-weight:600">'+p.nombre+'</div>' +
          '<div style="font-size:10px;color:var(--text-sub)">'+p.rut+'</div>' +
        '</div>';
      }).join('');
    })
    .withFailureHandler(function(e) { cont.innerHTML = '<div style="padding:16px;color:var(--rojo)">Error: '+e.message+'</div>'; })
    .buscarProveedores(termino);
}

    '</tr>';
  }).join('');
  recalcularTotalesCompra();

function recalcularTotalesCompra() {
  var tasaIva = 0.19;
  var subtotalNeto, iva, retencion, total;

  var tipoDocActual = document.getElementById('com-tipo') ? document.getElementById('com-tipo').value : '';
  var esNDCargoSimple = tipoDocActual === 'NOTA_DEBITO' && G._compra.esCargoSimpleND;

  if (esNDCargoSimple) {
    var montoND = Number(document.getElementById('com-monto-cargo-nd') ? document.getElementById('com-monto-cargo-nd').value : 0) || 0;
    var afectoND = document.getElementById('com-afecto-iva-nd') ? document.getElementById('com-afecto-iva-nd').checked : true;
    subtotalNeto = montoND;
    iva = afectoND ? Math.round(montoND * tasaIva) : 0;
    total = subtotalNeto + iva;
    document.getElementById('com-subtotal').textContent = fmtM(subtotalNeto);
    document.getElementById('com-iva').textContent = fmtM(iva);
    document.getElementById('com-total').textContent = fmtM(total);
    document.getElementById('com-retencion-wrap').style.display = 'none';
    return;
  }

  if (G._compra.esMercaderia) {
    subtotalNeto = G._compra.lineas.reduce(function(s,l){
      return s + Math.round(l.cantidad * l.costoUnitario * (1 - (l.descuentoPct||0)/100));
    }, 0);
    iva = Math.round(subtotalNeto * tasaIva);
    total = subtotalNeto + iva;
    document.getElementById('com-retencion-wrap').style.display = 'none';
  } else {
    var monto = Number(document.getElementById('com-monto-neto') ? document.getElementById('com-monto-neto').value : 0) || 0;
    subtotalNeto = monto;
    var esBH = document.getElementById('com-tipo') && document.getElementById('com-tipo').value === 'BOLETA_HONORARIOS';
    if (esBH) {
      retencion = Math.round(monto * 0.1525);
      total = monto - retencion;
      iva = 0;
      document.getElementById('com-retencion').textContent = fmtM(retencion);
      document.getElementById('com-retencion-wrap').style.display = 'block';
    } else {
      var afecto = document.getElementById('com-afecto-iva') ? document.getElementById('com-afecto-iva').checked : true;
      iva = afecto ? Math.round(monto * tasaIva) : 0;
      total = monto + iva;
      document.getElementById('com-retencion-wrap').style.display = 'none';
    }
  }

  document.getElementById('com-subtotal').textContent = fmtM(subtotalNeto);
  document.getElementById('com-iva').textContent = fmtM(iva||0);
  document.getElementById('com-total').textContent = fmtM(total);
}

function seleccionarProducto(lineaId, producto) {
  var linea = G._venta.lineas.find(function(l){ return l.lineaId === lineaId; });
  if (linea) {
    linea.productoId = producto.id;
    linea.nombre = producto.nombre;
    linea.precioNeto = producto.precioNeto;
    linea.stockDisponible = producto.stock;
    linea.cantidad = linea.cantidad || 1;
    linea.descuentoPct = linea.descuentoPct || 0;
  }
  renderLineasVenta();
  cerrarModal();
}

// ── LÍNEAS DE VENTA ──
function agregarLineaVenta() {
  var id = 'L' + Date.now() + Math.floor(Math.random()*1000);
  G._venta.lineas.push({ lineaId:id, productoId:null, nombre:'', precioNeto:0, cantidad:1, descuentoPct:0, stockDisponible:0 });
  renderLineasVenta();
}

function eliminarLineaVenta(lineaId) {
  G._venta.lineas = G._venta.lineas.filter(function(l){ return l.lineaId !== lineaId; });
  renderLineasVenta();
}

function actualizarLinea(lineaId, campo, valor) {
  var linea = G._venta.lineas.find(function(l){ return l.lineaId === lineaId; });
  if (linea) linea[campo] = Number(valor) || 0;
  renderLineasVenta();
}

function renderLineasVenta() {
  var body = document.getElementById('vta-lineas-body');
  if (!body) return;
  var soloLectura = G._cfgComercial && !G._cfgComercial.permitirModificarPrecio;
  var precioAttrs = soloLectura ? 'readonly style="width:80px;padding:4px;text-align:right;border:1px solid var(--border);border-radius:4px;background:var(--bg)"' : 'style="width:80px;padding:4px;text-align:right;border:1px solid var(--border);border-radius:4px"';

  body.innerHTML = G._venta.lineas.map(function(l) {
    var subtotal = Math.round(l.cantidad * l.precioNeto * (1 - l.descuentoPct/100));
    var stockWarn = l.productoId && l.cantidad > l.stockDisponible
      ? '<div style="font-size:9px;color:var(--rojo);font-weight:600">⚠️ Stock disponible: '+l.stockDisponible+'</div>' : '';
    return '<tr style="border-top:1px solid var(--border)">' +
      '<td style="padding:4px">' +
        '<div style="display:flex;gap:4px;align-items:center">' +
          '<span style="flex:1;font-size:11px">'+(l.nombre||'<span style="color:var(--text-light)">Sin producto</span>')+'</span>' +
          '<button class="per-btn" onclick="abrirBuscadorProducto(\''+l.lineaId+'\')" style="padding:2px 6px">🔍</button>' +
        '</div>' + stockWarn +
      '</td>' +
      '<td style="padding:4px"><input type="number" value="'+l.cantidad+'" min="1" onchange="actualizarLinea(\''+l.lineaId+'\',\'cantidad\',this.value)" style="width:60px;padding:4px;text-align:right;border:1px solid var(--border);border-radius:4px"></td>' +
      '<td style="padding:4px"><input type="number" value="'+l.precioNeto+'" '+precioAttrs+' onchange="actualizarLinea(\''+l.lineaId+'\',\'precioNeto\',this.value)"></td>' +
      '<td style="padding:4px"><input type="number" value="'+l.descuentoPct+'" min="0" max="100" onchange="actualizarLinea(\''+l.lineaId+'\',\'descuentoPct\',this.value)" style="width:60px;padding:4px;text-align:right;border:1px solid var(--border);border-radius:4px"></td>' +
      '<td style="padding:4px;text-align:right;font-weight:600">'+fmtM(subtotal)+'</td>' +
      '<td style="padding:4px;text-align:center"><span style="cursor:pointer;color:var(--rojo)" onclick="eliminarLineaVenta(\''+l.lineaId+'\')">🗑</span></td>' +
    '</tr>';
  }).join('');

  var subtotalNeto = G._venta.lineas.reduce(function(s,l){
    return s + Math.round(l.cantidad * l.precioNeto * (1 - l.descuentoPct/100));
  }, 0);
  var iva = Math.round(subtotalNeto * 0.19);
  var total = subtotalNeto + iva;
  document.getElementById('vta-subtotal').textContent = fmtM(subtotalNeto);
  document.getElementById('vta-iva').textContent = fmtM(iva);
  document.getElementById('vta-total').textContent = fmtM(total);
}

function recalcularTotalesVentaND() {
  var monto = Number(document.getElementById('vta-monto-cargo').value) || 0;
  var iva = Math.round(monto * 0.19);
  var total = monto + iva;
  document.getElementById('vta-subtotal').textContent = fmtM(monto);
  document.getElementById('vta-iva').textContent = fmtM(iva);
  document.getElementById('vta-total').textContent = fmtM(total);

// ── GUARDAR VENTA (placeholder, próxima iteración) ──
function guardarVenta() {
  if (!G._venta.cliente) {
    alert('Debes seleccionar un cliente');
    return;
  }

  var tipoDoc = document.getElementById('vta-tipo').value;
  var esNDSimple = tipoDoc === 'NOTA_DEBITO' && G._venta.esCargoSimple;

  var datos = {
    tipoDoc: tipoDoc,
    fecha: document.getElementById('vta-fecha').value,
    condicionPago: document.getElementById('vta-condicion').value,
    cliente: G._venta.cliente,
    esCargoSimple: esNDSimple,
    docOrigen: G._venta.docOrigen || null
  };

  if (esNDSimple) {
    var glosa = document.getElementById('vta-glosa-cargo').value;
    if (!glosa || glosa.trim()==='') {
      alert('Debes ingresar una descripción del cargo');
      return;
    }
    var monto = Number(document.getElementById('vta-monto-cargo').value);
    if (!monto || monto <= 0) {
      alert('El monto debe ser mayor a cero');
      return;
    }
    datos.glosaCargo = glosa;
    datos.montoCargo = monto;
  } else {
    if (!G._venta.lineas.length || !G._venta.lineas.some(function(l){ return l.productoId; })) {
      alert('Debes agregar al menos un producto');
      return;
    }
    datos.lineas = G._venta.lineas.filter(function(l){ return l.productoId; });
  }

  var btn = document.querySelector('.footer-acc-btn[onclick="guardarVenta()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  google.script.run
    .withSuccessHandler(function(resp) {
      if (btn) { btn.disabled = false; btn.textContent = '✓ Registrar Venta'; }
      if (!resp.ok) {
        alert('Error: ' + resp.error);
        return;
      }
      mostrarConfirmacionVenta(resp);
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = '✓ Registrar Venta'; }
      alert('Error del sistema: ' + e.message);
    })
    .procesarNuevaVenta(datos);
}

  var main = document.getElementById('main');
  main.innerHTML =

      '<th style="padding:4px;text-align:left">Doc</th>' +

      '<th style="padding:4px;text-align:left">Vence</th>' +
      '<th style="padding:4px;text-align:right">Monto</th>' +
      '<th style="padding:4px;text-align:right">Abono</th>' +
      '<th style="padding:4px;text-align:right">Saldo</th>' +
      '<th style="padding:4px;width:30px"></th>' +
      '</tr></thead><tbody>';
    d.documentos.forEach(function(doc) {
      var saldoFinal = doc.saldoFinal !== undefined ? doc.saldoFinal : doc.saldo;
      var estaPagado = saldoFinal <= 0;
      var estaVencido = !estaPagado && doc.dias < 0;
      var rowStyle = estaPagado ? 'color:var(--text-light)' :
                     estaVencido ? 'color:var(--rojo);font-weight:700' : 'color:var(--text)';
      var fechaEm = doc.emision ? new Date(doc.emision).toLocaleDateString('es-CL') : '—';
      var fechaVc = doc.vence ? new Date(doc.vence).toLocaleDateString('es-CL') : '—';
      var fnDetalle = esCliente ? 'abrirModalDetalleDoc' : 'abrirModalDetalleDocCompra';
      var btnCobrar = (esCliente && saldoFinal > 0 && doc.idCxc)
        ? '<td style="padding:4px;text-align:center"><button class="per-btn" onclick="event.stopPropagation();abrirModalCobro(\''+doc.idCxc+'\',\''+doc.doc+'\','+Math.max(saldoFinal,0)+')" style="background:var(--verde);color:#fff">💰</button></td>'
        : (!esCliente && saldoFinal > 0 && doc.idCxp)
        ? '<td style="padding:4px;text-align:center"><button class="per-btn" onclick="event.stopPropagation();abrirModalPago(\''+doc.idCxp+'\',\''+doc.doc+'\','+Math.max(saldoFinal,0)+')" style="background:var(--rojo);color:#fff">💸</button></td>'
        : '<td></td>';
      html += '<tr style="border-top:1px solid var(--border);'+rowStyle+';cursor:pointer" onclick="'+fnDetalle+'(\''+doc.doc+'\')" title="Clic para ver detalle">' +
        '<td style="padding:4px">'+doc.doc+'</td>' +
        '<td style="padding:4px;color:var(--text-light)">'+fechaEm+'</td>' +
        '<td style="padding:4px;color:var(--text-light)">'+fechaVc+'</td>' +
        '<td style="padding:4px;text-align:right">'+fmtM(doc.monto)+'</td>' +
        '<td style="padding:4px;text-align:right;color:var(--azul)">'+(doc.abono>0?fmtM(doc.abono):'—')+'</td>' +
        '<td style="padding:4px;text-align:right;font-weight:700">'+fmtM(Math.max(saldoFinal,0))+'</td>' +
        btnCobrar +
      '</tr>';
    });
    if (!d.documentos.length) {
      html += '<tr><td colspan="6" style="padding:8px;color:var(--text-light);text-align:center">Sin documentos</td></tr>';
    } else {
      var totalMonto = d.documentos.reduce(function(s,doc){ return s + doc.monto; }, 0);
      var totalAbono = d.documentos.reduce(function(s,doc){ return s + (doc.abono||0); }, 0);
      var totalSaldo = d.documentos.reduce(function(s,doc){ return s + Math.max((doc.saldoFinal!==undefined?doc.saldoFinal:doc.saldo),0); }, 0);
      html += '<tr style="border-top:2px solid var(--text);font-weight:700">' +
        '<td colspan="3" style="padding:4px">Total</td>' +
        '<td style="padding:4px;text-align:right">'+fmtM(totalMonto)+'</td>' +
        '<td style="padding:4px;text-align:right">'+fmtM(totalAbono)+'</td>' +
        '<td style="padding:4px;text-align:right">'+fmtM(totalSaldo)+'</td>' +
      '</tr>';
    }
    html += '</tbody></table>';
    cont.innerHTML = html;
    return;
  }

  if (tab === 'compras') {
    var html = '<table style="width:100%;border-collapse:collapse;font-size:10px">' +
      '<thead><tr style="color:var(--text-light);font-weight:600">' +
      '<th style="padding:4px;text-align:left">Fecha</th>' +
      '<th style="padding:4px;text-align:left">Documento</th>' +
      '<th style="padding:4px;text-align:right">Monto</th>' +
      '</tr></thead><tbody>';
    d.historialCompras.forEach(function(c) {
      var fecha = c.fecha ? new Date(c.fecha).toLocaleDateString('es-CL') : '—';
      html += '<tr style="border-top:1px solid var(--border)">' +
        '<td style="padding:4px;color:var(--text-light)">'+fecha+'</td>' +
        '<td style="padding:4px">'+c.doc+'</td>' +
        '<td style="padding:4px;text-align:right;font-weight:600">'+fmtM(c.monto)+'</td>' +
      '</tr>';
    });
    if (!d.historialCompras.length) {
      html += '<tr><td colspan="3" style="padding:8px;color:var(--text-light);text-align:center">Sin historial de compras</td></tr>';
    }
    html += '</tbody></table>';
    cont.innerHTML = html;
    return;
  }

  if (tab === 'pagos') {
    var html = '<table style="width:100%;border-collapse:collapse;font-size:10px">' +
      '<thead><tr style="color:var(--text-light);font-weight:600">' +
      '<th style="padding:4px;text-align:left">Fecha</th>' +
      '<th style="padding:4px;text-align:left">Documento</th>' +
      '<th style="padding:4px;text-align:right">Monto</th>' +
      '<th style="padding:4px;text-align:center">Estado</th>' +
      '<th style="padding:4px;width:60px"></th>' +
      '</tr></thead><tbody>';
    d.historialPagos.forEach(function(p) {
      var fecha = p.fecha ? new Date(p.fecha).toLocaleDateString('es-CL') : '—';
      var rowStyle = p.anulado ? 'color:var(--text-light);text-decoration:line-through' : '';
      var estadoTxt = p.anulado
        ? '<span style="font-size:9px;background:var(--rojo-light);color:var(--rojo);padding:1px 6px;border-radius:4px">ANULADO</span>'
        : '<span style="font-size:9px;background:var(--verde-light);color:var(--verde);padding:1px 6px;border-radius:4px">VIGENTE</span>';
      var idAccion = esCliente ? p.idCobro : p.idPago;
      var fnAnular = esCliente ? 'abrirModalAnularCobro' : 'abrirModalAnularPago';
      var btnAnular = (!p.anulado && idAccion)
        ? '<td style="padding:4px;text-align:center"><button class="per-btn" onclick="'+fnAnular+'(\''+idAccion+'\')" style="color:var(--rojo)">Anular</button></td>'
        : '<td></td>';
      html += '<tr style="border-top:1px solid var(--border);'+rowStyle+'">' +
        '<td style="padding:4px;color:var(--text-light)">'+fecha+'</td>' +
        '<td style="padding:4px">'+p.doc+'</td>' +
        '<td style="padding:4px;text-align:right;font-weight:600">'+fmtM(p.monto)+'</td>' +
        '<td style="padding:4px;text-align:center">'+estadoTxt+'</td>' +
        btnAnular +
      '</tr>';
      if (p.anulado) {
        html += '<tr style="border-top:none"><td colspan="5" style="padding:0 4px 6px;font-size:9px;color:var(--text-light)">Motivo: '+p.motivoAnulacion+' · Por: '+p.anuladoPor+' · '+(p.fechaAnulacion?new Date(p.fechaAnulacion).toLocaleDateString('es-CL'):'—')+'</td></tr>';
      }
    });
    if (!d.historialPagos.length) {
      html += '<tr><td colspan="5" style="padding:8px;color:var(--text-light);text-align:center">Sin historial de pagos</td></tr>';
    }
    html += '</tbody></table>';
    cont.innerHTML = html;
    return;
  }
}

function guardarCobro(idCxc) {
  var monto = Number(document.getElementById('cob-monto').value);
  var fecha = document.getElementById('cob-fecha').value;
  var medioPago = document.getElementById('cob-medio').value;
  var referencia = document.getElementById('cob-referencia').value;

  if (!monto || monto <= 0) { alert('El monto debe ser mayor a cero'); return; }
  if (!fecha) { alert('Debes indicar la fecha de cobro'); return; }
  if (!medioPago) { alert('Debes seleccionar un medio de pago'); return; }

  var btn = document.querySelector('.footer-acc-btn[onclick*="guardarCobro"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) {
        alert('Error: ' + resp.error);
        if (btn) { btn.disabled = false; btn.textContent = '✓ Registrar Cobro'; }
        return;
      }
      cerrarModal();
      abrirFicha('cliente', G._fichaData.ficha.id);
    })
    .withFailureHandler(function(e) {
      alert('Error del sistema: ' + e.message);
      if (btn) { btn.disabled = false; btn.textContent = '✓ Registrar Cobro'; }
    })
    .registrarCobroCxC({
      idCxc: idCxc,
      monto: monto,
      fechaCobro: fecha,
      idMedioPago: medioPago,
      referenciaPago: referencia
    });
}

function renderLineasNCParcial() {
  var cont = document.getElementById('ncparcial-body');
  if (!cont) return;
  var html = '<table style="width:100%;border-collapse:collapse;font-size:11px">' +
    '<thead><tr style="color:var(--text-light);font-weight:600">' +
    '<th style="padding:4px;width:24px"></th>' +
    '<th style="padding:4px;text-align:left">Producto</th>' +
    '<th style="padding:4px;text-align:right">Vendido</th>' +
    '<th style="padding:4px;text-align:right;width:90px">A devolver</th>' +
    '</tr></thead><tbody>';
  G._ncParcial.lineas.forEach(function(l, idx) {
    var marcado = G._ncParcial.seleccion[idx] !== undefined;
    var cantActual = marcado ? G._ncParcial.seleccion[idx] : l.cantidadVendida;
    html += '<tr style="border-top:1px solid var(--border)">' +
      '<td style="padding:4px;text-align:center"><input type="checkbox" '+(marcado?'checked':'')+' onchange="toggleLineaNCParcial('+idx+',this.checked)"></td>' +
      '<td style="padding:4px">'+l.nombre+'</td>' +
      '<td style="padding:4px;text-align:right;color:var(--text-sub)">'+l.cantidadVendida+'</td>' +
      '<td style="padding:4px;text-align:right"><input type="number" value="'+cantActual+'" min="1" max="'+l.cantidadVendida+'" '+(marcado?'':'disabled')+' onchange="actualizarCantidadNCParcial('+idx+',this.value)" style="width:70px;padding:3px;text-align:right;border:1px solid var(--border);border-radius:4px"></td>' +
    '</tr>';
  });
  html += '</tbody></table>';
  cont.innerHTML = html;
}

function toggleLineaNCParcial(idx, checked) {
  if (checked) {
    G._ncParcial.seleccion[idx] = G._ncParcial.lineas[idx].cantidadVendida;
  } else {
    delete G._ncParcial.seleccion[idx];
  }
  renderLineasNCParcial();
}

function actualizarCantidadNCParcial(idx, valor) {
  var max = G._ncParcial.lineas[idx].cantidadVendida;
  var v = Math.min(Math.max(Number(valor)||1, 1), max);
  G._ncParcial.seleccion[idx] = v;
}

function guardarCompra() {
  if (!G._compra.proveedor) {
    alert('Debes seleccionar un proveedor o prestador');
    return;
  }
  var numeroDoc = document.getElementById('com-numero').value;
  if (!numeroDoc || numeroDoc.trim()==='') {
    alert('Debes ingresar el número de documento');
    return;
  }

  var tipoDoc = document.getElementById('com-tipo').value;
  var esNDCargoSimple = tipoDoc === 'NOTA_DEBITO' && G._compra.esCargoSimpleND;

  var datos = {
    esMercaderia: G._compra.esMercaderia,
    tipoDoc: tipoDoc,
    esCargoSimple: esNDCargoSimple,
    proveedor: G._compra.proveedor,
    fecha: document.getElementById('com-fecha').value,
    numeroDoc: numeroDoc,
    condicionPago: document.getElementById('com-condicion').value,
    centroCosto: document.getElementById('com-cc').value || ''
  };

  if (esNDCargoSimple) {
    var glosaND = document.getElementById('com-glosa-cargo-nd').value;
    if (!glosaND || glosaND.trim()==='') {
      alert('Debes ingresar una descripción del cargo');
      return;
    }
    var montoND = Number(document.getElementById('com-monto-cargo-nd').value);
    if (!montoND || montoND <= 0) {
      alert('El monto debe ser mayor a cero');
      return;
    }
    datos.glosaCargo = glosaND;
    datos.montoCargo = montoND;
    datos.afectoIva = document.getElementById('com-afecto-iva-nd') ? document.getElementById('com-afecto-iva-nd').checked : true;
  } else if (G._compra.esMercaderia) {
    if (!G._compra.lineas.length || !G._compra.lineas.some(function(l){return l.productoId;})) {
      alert('Debes agregar al menos un producto');
      return;
    }
    datos.lineas = G._compra.lineas.filter(function(l){ return l.productoId; });
  } else {
    if (!G._compra.cuentaContable) {
      alert('Debes seleccionar la cuenta contable');
      return;
    }
    var glosa = document.getElementById('com-glosa').value;
    if (!glosa || glosa.trim()==='') {
      alert('Debes ingresar una glosa/descripción');
      return;
    }
    var monto = Number(document.getElementById('com-monto-neto').value);
    if (!monto || monto <= 0) {
      alert('El monto debe ser mayor a cero');
      return;
    }
    datos.cuentaContable = G._compra.cuentaContable;
    datos.glosa = glosa;
    datos.montoNeto = monto;
    datos.afectoIva = document.getElementById('com-afecto-iva') ? document.getElementById('com-afecto-iva').checked : true;
  }

  var btn = document.querySelector('.footer-acc-btn[onclick="guardarCompra()"]');
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  google.script.run
    .withSuccessHandler(function(resp) {
      if (btn) { btn.disabled = false; btn.textContent = '✓ Registrar'; }
      if (!resp.ok) { alert('Error: ' + resp.error); return; }
      mostrarConfirmacionCompra(resp);
    })
    .withFailureHandler(function(e) {
      if (btn) { btn.disabled = false; btn.textContent = '✓ Registrar'; }
      alert('Error del sistema: ' + e.message);
    })
    .procesarNuevaCompra(datos);
}

function confirmarCierrePeriodo(periodo) {
  if (!confirm('¿Confirmas el cierre del período '+periodo+'? Esta acción congelará las cifras y bloqueará nuevas transacciones en este mes. Solo se puede revertir con clave de administrador.')) return;
  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) { alert('Error: ' + resp.error); return; }
      alert('Período '+resp.periodo+' cerrado correctamente. Utilidad neta: ' + fmtM(resp.utilidadNeta));
      navegar('cierres');
    })
    .withFailureHandler(function(e) { alert('Error: ' + e.message); })
    .cerrarPeriodo(periodo);
}

function pintarCentroReportes() {

  function tabBtn(id, label) {

function cambiarTabReportes(tab) {
  G._reportesTab = tab;
  document.querySelectorAll('[data-rtab]').forEach(function(b) {
    b.classList.toggle('active', b.dataset.rtab === tab);
  });
  renderReportesTab(tab);
}

function renderReportesTab(tab) {
  var cont = document.getElementById('reportes-content');
  cont.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';

  if (tab === 'eerr') {
    google.script.run
      .withSuccessHandler(function(d) { renderEERR(d); })
      .withFailureHandler(function(e) { cont.innerHTML = '<div style="color:var(--rojo)">Error: '+e.message+'</div>'; })
      .getEERRData(G._reportesPeriodo);
    return;
  }
  if (tab === 'flujoefectivo') {
    google.script.run
      .withSuccessHandler(function(d) { renderFlujoEfectivo(d); })
      .withFailureHandler(function(e) { cont.innerHTML = '<div style="color:var(--rojo)">Error: '+e.message+'</div>'; })
      .getFlujoEfectivoHistorico(G._reportesPeriodo);
    return;
  }
  if (tab === 'indicadores') {
    google.script.run
      .withSuccessHandler(function(d) { renderIndicadores(d); })
      .withFailureHandler(function(e) { cont.innerHTML = '<div style="color:var(--rojo)">Error: '+e.message+'</div>'; })
      .getIndicadoresGerenciales(G._reportesPeriodo);
    return;
  }
  if (tab === 'flujocaja') {
    google.script.run
      .withSuccessHandler(function(d) { renderFlujoCajaReporte(d); })
      .withFailureHandler(function(e) { cont.innerHTML = '<div style="color:var(--rojo)">Error: '+e.message+'</div>'; })
      .getFlujoCajaMultiMes(6);
    return;
  }
  if (tab === 'consolidado') {
    google.script.run
      .withSuccessHandler(function(d) { renderConsolidado(d); })
      .withFailureHandler(function(e) { cont.innerHTML = '<div style="color:var(--rojo)">Error: '+e.message+'</div>'; })
      .getConsolidadoFinanciero(G._reportesPeriodo);
    return;
  }
  if (tab === 'rentabilidad') {
    Promise.all([
      new Promise(function(resolve){ google.script.run.withSuccessHandler(resolve).getRentabilidadClientes(G._reportesPeriodo); }),
      new Promise(function(resolve){ google.script.run.withSuccessHandler(resolve).getRentabilidadProductos(G._reportesPeriodo); })
    ]).then(function(res) {
      renderRentabilidadDetalle(res[0], res[1]);
    });
    return;
  }
  cont.innerHTML = '<div class="coming"><div class="coming-icon">📊</div><div class="coming-title">Próximamente</div></div>';
}

function renderIndicadores(d) {
  var cont = document.getElementById('reportes-content');
  if (!d) { cont.innerHTML = '<div style="color:var(--text-light)">Sin datos para este período</div>'; return; }

  function clsCCC(v) { return v<=30?'verde':v<=60?'amar':'rojo'; }
  function colorCCC(v) { return v<=30?'#1B5E20':v<=60?'#8A6D00':'#A1342B'; }

  function interpretarDSO(v) { return v<=35 ? 'Tus clientes pagan en un plazo saludable; la cobranza está bajo control.' : v<=50 ? 'El plazo de cobro es algo elevado; vale la pena reforzar la gestión de cobranza.' : 'El plazo de cobro es alto y puede estar afectando tu liquidez; se recomienda revisar políticas de crédito.'; }
  function interpretarDPO(v) { return v<=35 ? 'Estás pagando a proveedores con rapidez; hay margen para negociar plazos más largos.' : v<=50 ? 'El plazo de pago está en un rango razonable frente al estándar del negocio.' : 'Estás tomando plazos largos para pagar; esto mejora tu caja pero puede tensionar la relación con proveedores.'; }
  function interpretarInv(v) { return v<=30 ? 'El inventario rota rápido; baja inmovilización de capital.' : v<=60 ? 'La rotación de inventario es moderada.' : 'El inventario tarda en rotar; revisa si hay stock de baja salida inmovilizando capital.'; }
  function interpretarCCC(v) { return v<=30 ? 'El ciclo de caja es corto: el negocio recupera el efectivo invertido rápidamente.' : v<=60 ? 'El ciclo de caja es moderado; hay espacio para optimizar cobranza, pagos o inventario.' : 'El ciclo de caja es largo: el dinero queda comprometido por más tiempo del ideal antes de volver como efectivo.'; }
  function interpretarMargen(v, tipo) { return v>=0.2 ? 'Margen '+tipo+' saludable para el período.' : v>=0 ? 'Margen '+tipo+' positivo pero ajustado; hay espacio para mejorar eficiencia.' : 'Margen '+tipo+' negativo: el negocio está operando con pérdida en este período.'; }
  function interpretarEbitda(v) { return v>=0 ? 'El resultado operacional es positivo antes de considerar depreciación y amortización.' : 'El resultado operacional es negativo; revisa estructura de costos y gastos del período.'; }

  function tarjeta(label, valor, color, interp) {

      '<div style="font-size:10.5px;color:#555;line-height:1.5;border-top:1px solid #eee;padding-top:8px;font-family:Arial,sans-serif">'+interp+'</div>' +
    '</div>';

  var html =
    '<div id="indicadores-printable">' +
    '<div class="doc-header" style="border-bottom:3px double var(--azul);padding-bottom:14px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start">' +
      '<div>' +
        '<div class="doc-title" style="font-size:9px;font-weight:700;color:var(--azul);text-transform:uppercase;letter-spacing:1.5px">INDICADORES GERENCIALES</div>' +
        '<div class="empresa" style="font-size:20px;font-weight:700;color:var(--text);margin-top:4px;font-family:Georgia,serif">'+(G.ctx?G.ctx.nombreEmpresa:'')+'</div>' +
        '<div style="font-size:11px;color:var(--text-sub);margin-top:2px">Mes de '+d.periodo+' · Cifras en pesos chilenos (CLP)</div>' +
      '</div>' +
      '<button class="footer-acc-btn no-print" onclick="exportarReportePDF(\'indicadores-printable\',\'Indicadores_'+d.periodo+'\')" style="background:var(--azul)">⬇ Exportar PDF</button>' +
    '</div>' +

    '<div class="section-block">' +
    '<div class="section-title-print" style="border-bottom:1px solid var(--azul);color:var(--azul);font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding-bottom:5px;margin-bottom:10px">Ciclo de Conversión de Efectivo</div>' +

    '</div>';

  cont.innerHTML = html;

function renderFlujoCajaReporte(lista) {
  var cont = document.getElementById('reportes-content');
  if (!lista || !lista.length) { cont.innerHTML = '<div style="color:var(--text-light)">Sin datos disponibles</div>'; return; }

  function fmtNum(v) {
    var neg = v < 0;
    return (neg?'(':'') + fmtM(Math.abs(v)).replace('$','') + (neg?')':'');
  }

  var cols = lista.map(function(d){ return d.periodo; });

  function filaMulti(label, campo, opts) {
    opts = opts || {};
    var rowStyleScreen = opts.total
      ? 'border-top:2px solid var(--azul);border-bottom:2px solid var(--azul);background:var(--azul-light)'
      : opts.subtotal
      ? 'border-top:1.5px solid var(--text)'
      : 'border-top:1px solid var(--border)';
    var fw = (opts.total || opts.subtotal) ? '700' : '400';
    var html = '<tr style="'+rowStyleScreen+'"><td style="padding:8px;font-weight:'+fw+';font-size:12px;white-space:nowrap">'+label+'</td>';
    lista.forEach(function(d) {

function getConsolidadoFinanciero(periodo) {
  try {
    var eerr = getEERRData(periodo);
    var finanzas = getFinanzasData();
    var cobranza = getCobranzaData();
    var inventario = getInventarioData();
    var rentClientes = getRentabilidadClientes(periodo);
    var rentProductos = getRentabilidadProductos(periodo);

    if (!eerr || !finanzas) return null;

    var sinMovimiento = [];
    var valorInmovilizado = 0;
    var valorTotalInventario = inventario ? inventario.valorCosto : 0;
    if (inventario && inventario.productos) {
      inventario.productos.forEach(function(p) {
        if (p.diasSinVenta !== null && p.diasSinVenta !== undefined && p.diasSinVenta >= 90) {
          sinMovimiento.push({ nombre: p.nombre, diasSinVenta: p.diasSinVenta, valor: p.valor });
          valorInmovilizado += p.valor;
        }
      });
    }
    sinMovimiento.sort(function(a,b){ return b.valor - a.valor; });
    var pctInmovilizado = valorTotalInventario > 0 ? valorInmovilizado/valorTotalInventario : 0;

    var alertas = [];
    if (finanzas.flujoProyectado < 0) {
      alertas.push({ nivel:'critico', mensaje: 'Flujo de caja proyectado a 30 días es negativo: ' + fmtMoneyServer(finanzas.flujoProyectado) });
    }
    if (cobranza && cobranza.concentracionMax > 0.5) {
      alertas.push({ nivel:'advertencia', mensaje: 'Un cliente concentra ' + Math.round(cobranza.concentracionMax*100) + '% de la cartera por cobrar' });
    }
    if (eerr.margenBrutoPct < 0.15) {
      alertas.push({ nivel:'critico', mensaje: 'Margen bruto del período es bajo: ' + (eerr.margenBrutoPct*100).toFixed(1) + '%' });
    }
    if (pctInmovilizado > 0.2) {
      alertas.push({ nivel:'advertencia', mensaje: Math.round(pctInmovilizado*100) + '% del valor de inventario está inmovilizado (sin ventas en 90+ días)' });
    }
    if (cobranza && cobranza.cxcVencida > 0 && cobranza.cxcTotal > 0 && (cobranza.cxcVencida/cobranza.cxcTotal) > 0.15) {
      alertas.push({ nivel:'critico', mensaje: 'Cartera vencida representa ' + Math.round((cobranza.cxcVencida/cobranza.cxcTotal)*100) + '% del total por cobrar' });
    }

    return {
      periodo: eerr.periodo,
      resumenEjecutivo: {
        ventasTotales: eerr.ventasNetas,
        costoVentas: eerr.costoVenta,
        margenBruto: eerr.utilidadBruta,
        gastosOperacionales: eerr.gastosOperacionales,
        utilidadOperacional: eerr.resultadoOperacional,
        utilidadNeta: eerr.utilidadNeta,
        cajaDisponible: finanzas.cajaReal,
        cuentasPorCobrar: finanzas.cxcTotal,
        cuentasPorPagar: finanzas.cxpTotal
      },
      eerr: eerr,
      flujoCaja: {
        cajaActual: finanzas.cajaPeriodo,
        cxc30d: finanzas.cxc030,
        cxpExigible: finanzas.cxpPresion,
        flujoProyectado: finanzas.flujoProyectado
      },
      rentClientes: rentClientes ? rentClientes.clientes.slice(0,5) : [],
      rentProductos: rentProductos ? rentProductos.productos.slice(0,5) : [],
      inventarioCritico: {
        sinMovimiento: sinMovimiento.slice(0,10),
        stockInmovilizadoValorizado: valorInmovilizado,
        pctDelInventarioTotal: pctInmovilizado
      },
      alertas: alertas
    };

  } catch(e) {
    Logger.log('getConsolidadoFinanciero ERROR: ' + e.message);
    return null;
  }
}

function renderFilasRent(lista, tipo) {
  if (!lista.length) return '<tr><td colspan="5" style="text-align:center;color:#999">Sin datos del período</td></tr>';
  return lista.map(function(item) {
    var cls = item.margenPct >= 0.3 ? 'color:#1B5E20' : item.margenPct >= 0.15 ? 'color:#8A6D00' : 'color:#A1342B';
    var ultimaCol = tipo === 'cliente' ? item.documentos : item.cantidad;
    return '<tr data-nombre="'+item.nombre.toLowerCase()+'">' +
      '<td style="font-weight:500">'+item.nombre+'</td>' +
      '<td style="text-align:right">'+fmtM(item.ventas)+'</td>' +
      '<td style="text-align:right;font-weight:600">'+fmtM(item.margen)+'</td>' +
      '<td style="text-align:right;font-weight:700;'+cls+'">'+fmtP(item.margenPct)+'</td>' +
      '<td style="text-align:right">'+ultimaCol+'</td>' +
    '</tr>';
  }).join('');
}

function filtrarRentTabla(tipo) {
  var termino = document.getElementById('rent-buscar-'+tipo).value.toLowerCase();
  var tbody = document.querySelector('#tabla-rent-'+tipo+' tbody');
  tbody.querySelectorAll('tr').forEach(function(tr) {
    var nombre = tr.getAttribute('data-nombre') || '';
    tr.style.display = nombre.indexOf(termino) !== -1 ? '' : 'none';
  });
}

function descargarPlantillaCSV(fn) {
  google.script.run
    .withSuccessHandler(function(csv) {
      var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = fn.replace('descargarPlantilla','').replace('CSV','').toLowerCase() + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    })
    .withFailureHandler(function(e) { alert('Error generando plantilla: ' + e.message); })
    [fn]();
}

function subirCSVCarga(input, nombreFuncion, titulo) {
  var archivo = input.files[0];
  if (!archivo) return;
  if (!confirm('¿Procesar carga de '+titulo+' desde "'+archivo.name+'"? Esta acción creará los registros en el sistema.')) {
    input.value = '';
    return;
  }

  var reader = new FileReader();
  reader.onload = function(e) {
    var csvTexto = e.target.result;
    google.script.run
      .withSuccessHandler(function(resp) {
        input.value = '';
        if (!resp.ok) { alert('Error: ' + resp.error); return; }
        var msg = 'Carga de '+titulo+' completada.\n';
        if (resp.creados !== undefined) msg += 'Creados: '+resp.creados+'\n';
        if (resp.omitidos !== undefined) msg += 'Omitidos (ya existían): '+resp.omitidos+'\n';
        if (resp.errores && resp.errores.length) msg += '\nErrores:\n' + resp.errores.join('\n');
        alert(msg);
      })
      .withFailureHandler(function(e) { input.value = ''; alert('Error del sistema: ' + e.message); })
      .procesarCargaMasivaProductosCSV(csvTexto);
  };
  reader.readAsText(archivo, 'UTF-8');
}

function renderListaMediosPago(lista) {
  var html = '<table style="width:100%;border-collapse:collapse;font-size:11px">' +
    '<thead><tr style="color:var(--text-light);font-weight:600">' +
    '<th style="padding:5px;text-align:left">Orden</th>' +
    '<th style="padding:5px;text-align:left">Nombre</th>' +
    '<th style="padding:5px;text-align:center">Activo</th>' +
    '<th style="padding:5px;text-align:center">Default</th>' +
    '<th style="padding:5px;text-align:right">Acciones</th>' +
    '</tr></thead><tbody>';
  lista.forEach(function(m, idx) {
    var esInterno = m.id === 'ANTICIPO';
    html += '<tr style="border-top:1px solid var(--border)">' +
      '<td style="padding:6px">' +
        (idx>0 && !esInterno ? '<span style="cursor:pointer;margin-right:4px" onclick="moverMedioPago(\''+m.id+'\',-1)">▲</span>' : '') +
        (idx<lista.length-1 && !esInterno ? '<span style="cursor:pointer" onclick="moverMedioPago(\''+m.id+'\',1)">▼</span>' : '') +
      '</td>' +
      '<td style="padding:6px;font-weight:500">'+m.nombre+(esInterno?' <span style="font-size:9px;color:var(--text-light)">(interno)</span>':'')+'</td>' +
      '<td style="padding:6px;text-align:center">'+(m.activo?'🟢':'🔴')+'</td>' +
      '<td style="padding:6px;text-align:center">'+(m.esDefault?'⭐':'') +
        (!esInterno && !m.esDefault ? ' <button class="per-btn" style="padding:1px 6px;font-size:9px" onclick="marcarDefault(\''+m.id+'\')">Marcar</button>' : '') +
      '</td>' +
      '<td style="padding:6px;text-align:right">' +
        (!esInterno ? '<button class="per-btn" style="padding:2px 8px" onclick="editarMedioPagoUI(\''+m.id+'\',\''+m.nombre.replace(/'/g,"\\'")+'\')">Editar</button> ' : '') +
        (!esInterno ? '<button class="per-btn" style="padding:2px 8px" onclick="toggleActivoUI(\''+m.id+'\')">'+(m.activo?'Desactivar':'Activar')+'</button>' : '') +
      '</td>' +
    '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

    })
    .withFailureHandler(function(e) { alert('Error: ' + e.message); })
    .marcarMedioPagoDefault(id);

function moverMedioPago(id, direccion) {
  var lista = G._mediosPagoData.slice();
  var idx = lista.findIndex(function(m){ return m.id === id; });
  var nuevoIdx = idx + direccion;
  if (nuevoIdx < 0 || nuevoIdx >= lista.length) return;
  var tmp = lista[idx];
  lista[idx] = lista[nuevoIdx];
  lista[nuevoIdx] = tmp;
  var idsEnOrden = lista.map(function(m){ return m.id; });
  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) { alert('Error: ' + resp.error); return; }
      cambiarConfigSeccion('mediospago');
    })
    .withFailureHandler(function(e) { alert('Error: ' + e.message); })
    .reordenarMediosPago(idsEnOrden);
}

      '<div class="kpi-v" style="font-size:16px">'+fechaTxt+'</div>' +
    '</div>' +
    '<div class="chart-card" style="margin-bottom:14px">' +
      '<div style="font-weight:600;font-size:12px;margin-bottom:8px">Exportar Respaldo</div>' +
      '<div style="font-size:11px;color:var(--text-sub);margin-bottom:10px">Crea una copia completa de la planilla VANTIS con fecha y hora en el nombre.</div>' +
      '<button class="footer-acc-btn" style="background:var(--azul)" onclick="exportarRespaldoUI()">⬇ Exportar Respaldo Completo</button>' +
      '<div id="respaldo-resultado" style="margin-top:10px;font-size:11px"></div>' +
    '</div>' +
    '<div class="chart-card">' +
      '<div style="font-weight:600;font-size:12px;margin-bottom:8px;color:var(--text-light)">Restaurar Respaldo</div>' +
      '<div style="font-size:11px;color:var(--text-light)">Disponible en próxima fase</div>' +
    '</div>';
}

function exportarRespaldoUI() {
  var res = document.getElementById('respaldo-resultado');
  res.innerHTML = 'Generando respaldo...';
  google.script.run
    .withSuccessHandler(function(resp) {
      if (!resp.ok) { res.innerHTML = '<span style="color:var(--rojo)">Error: '+resp.error+'</span>'; return; }
      res.innerHTML = '✅ Respaldo creado: <a href="'+resp.url+'" target="_blank">'+resp.nombre+'</a>';
    })
    .withFailureHandler(function(e) { res.innerHTML = '<span style="color:var(--rojo)">Error: '+e.message+'</span>'; })
    .exportarRespaldoCompleto();
}

// ── SISTEMA ──
function renderConfigSistemaInfo(d) {
  var cont = document.getElementById('config-content');
  if (!d) { cont.innerHTML = '<div style="color:var(--text-light)">Sin datos</div>'; return; }
  var fechaTxt = d.ultimaActualizacion ? new Date(d.ultimaActualizacion).toLocaleString('es-CL') : '—';
  var estadoColor = d.estadoSistema === 'OK' ? 'var(--verde)' : 'var(--amarillo)';
  cont.innerHTML =
    '<div class="chart-title" style="margin-bottom:14px">Información del Sistema</div>' +
    '<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">' +
      kpiF('VERSIÓN ERP', d.version, 'VANTIS ERP', 'azul') +
      kpiF('EMPRESA ACTIVA', d.empresaActiva, '', 'azul') +
      kpiF('PERÍODO ACTIVO', d.periodoActivo, '', 'azul') +
      kpiF('ÚLTIMA ACTUALIZACIÓN', fechaTxt, 'Archivo Google Sheets', 'azul') +
      '<div class="kpi" style="border-top-color:'+estadoColor+'"><div class="kpi-t">ESTADO DEL SISTEMA</div><div class="kpi-v" style="color:'+estadoColor+'">'+d.estadoSistema+'</div><div class="kpi-s">Último proceso batch</div></div>' +
      kpiF('BASE DE DATOS', d.baseDatos, '', 'azul') +
    '</div>';
}
</script>
</body>
</html>
